name: CI Graphite
on:
  push:
    branches:
      - main
      - next
  pull_request:
    branches:
      - main
      - next
  merge_group:
    types:
      - checks_requested

concurrency:
  group: ${{ github.ref }}-graphite
  cancel-in-progress: true

jobs:
  build-android-graphite:
    if: ${{ github.repository == 'shopify/react-native-skia' }}
    runs-on: ubuntu-latest
    env:
      TURBO_CACHE_DIR: .turbo/android
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          graphite: true

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Cache turborepo for Android
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-android-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-android

      - name: Install JDK
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install NDK
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1.6.0
        id: setup-ndk
        with:
          ndk-version: r27d

      - name: Set ANDROID_NDK
        run: echo "ANDROID_NDK=$ANDROID_HOME/ndk-bundle" >> $GITHUB_ENV

      - name: Finalize Android SDK
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Install Android SDK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > $GITHUB_WORKSPACE/apps/example/android/local.properties

      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('./apps/example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build example for Android
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
        run: |
          yarn turbo run build:android --concurrency 1

      - name: Cache apk
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        env:
          cache-name: cache-apk
        with:
          path: apps/example/android/app/build/outputs/apk/debug/app-debug.apk
          key: apk-graphite-${{ github.sha }}

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: android-example-apk-graphite
          path: apps/example/android/app/build/outputs/apk/debug/app-debug.apk

  test-android-graphite:
    if: ${{ github.repository == 'shopify/react-native-skia' }}
    needs: build-android-graphite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TURBO_CACHE_DIR: .turbo/android
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          graphite: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android SDK tools
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Restore APK
        id: cache-apk
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: apps/example/android/app/build/outputs/apk/debug/app-debug.apk
          key: apk-graphite-${{ github.sha }}

      - name: Start Package Manager
        working-directory: apps/example/
        run: E2E=true yarn start &

      - name: Run Android Emulator Tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 30
          arch: x86_64
          profile: Nexus 5X
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swangle_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            # Wait for Metro bundler
            sleep 10

            # Install and launch app
            adb install -r apps/example/android/app/build/outputs/apk/debug/app-debug.apk
            adb shell monkey -p com.microsoft.reacttestapp 1

            # Run tests
            # On Graphite we run the Path render tests plus the WebGPU specs.
            # ArrayBuffer, ComputeShader, ErrorScope, ImageBitmapBounds and
            # DawnToggles are pure surface.eval round-trips that assert on
            # returned values. The external-texture specs (ExternalTexture,
            # ImportExternalTexture, SharedTextureMemory) additionally exercise
            # NativeBuffer import and GPU read-back; they self-validate via
            # copyTextureToBuffer (not Skia image readPixels) and skip
            # themselves where NativeBuffer/createImageBitmap are unavailable.
            cd packages/skia && CI=true yarn test -i "e2e/(Path|ArrayBuffer|ComputeShader|ErrorScope|ImageBitmapBounds|DawnToggles|ExternalTexture|ImportExternalTexture|SharedTextureMemory)" --testPathIgnorePatterns Paragraphs

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        if: failure()
        with:
          path: packages/skia/src/__tests__/snapshots/
          name: tests-snapshots-screenshots

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        if: failure()
        with:
          path: apps/docs/static/
          name: tests-docs-screenshots

  build-test-ios-graphite:
    if: ${{ github.repository == 'shopify/react-native-skia' }}
    runs-on: macos-latest-xlarge
    env:
      TURBO_CACHE_DIR: .turbo/ios
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          graphite: true

      - name: Cache turborepo for iOS
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-ios-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-ios-

      - name: Check turborepo cache for iOS
        run: |
          TURBO_CACHE_STATUS=$(node -p "($(yarn turbo run build:ios --cache-dir=\"${{ env.TURBO_CACHE_DIR }}\" --dry=json)).tasks.find(t => t.task === 'build:ios').cache.status")

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      - name: Install CocoaPods
        working-directory: apps/example/ios
        run: pod install

      - name: Start Package Manager
        working-directory: apps/example
        run: E2E=true yarn start &

      - name: Select iOS simulator
        run: |
          SIMULATOR_NAME=$(xcrun simctl list devices available --json | jq -r '
            .devices
            | to_entries
            | map(select(.key | contains("iOS")))
            | sort_by(.key)
            | reverse
            | map(.value[] | select(.name | startswith("iPhone")))
            | .[0].name // empty')
          if [ -z "$SIMULATOR_NAME" ]; then
            echo "No available iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator: $SIMULATOR_NAME"
          echo "IOS_SIMULATOR=$SIMULATOR_NAME" >> $GITHUB_ENV

      - name: Build example for iOS
        working-directory: apps/example
        run: yarn ios --simulator "$IOS_SIMULATOR"

      - name: Run e2e tests
        working-directory: packages/skia
        # On Graphite we run the Paths render test plus the WebGPU specs.
        # ArrayBuffer, ComputeShader, ErrorScope, ImageBitmapBounds and
        # DawnToggles are pure surface.eval round-trips that assert on returned
        # values. The external-texture specs (ExternalTexture,
        # ImportExternalTexture, SharedTextureMemory) additionally exercise
        # NativeBuffer import and GPU read-back; they self-validate via
        # copyTextureToBuffer (not Skia image readPixels) and skip themselves
        # where NativeBuffer/createImageBitmap are unavailable.
        run: CI=true E2E=true yarn test -i "e2e/(Paths|ArrayBuffer|ComputeShader|ErrorScope|ImageBitmapBounds|DawnToggles|ExternalTexture|ImportExternalTexture|SharedTextureMemory)"

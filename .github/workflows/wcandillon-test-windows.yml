# OWNER: wcandillon/react-native-skia
# Manual-dispatch Windows build check. Mirrors the build-windows-library job
# that used to live in CI. Runs on a GitHub-hosted windows-latest runner.
name: 🙋‍♂️ Test Windows
on:
  workflow_dispatch:

jobs:
  build-windows-library:
    if: ${{ github.repository == 'wcandillon/react-native-skia' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        run: yarn build

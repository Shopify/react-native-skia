# OWNER: wcandillon/react-native-skia
# Manual-dispatch package e2e test: builds the package from the current branch,
# then installs the resulting .tgz into a fresh Expo app and runs it on
# iOS / Android / Web. Mirrors the test-package-e2e jobs that used to live in
# CI. The macOS test jobs run on GitHub-hosted runners (see
# wcandillon-test-skia-package.yml).
name: wcandillon - Test Package
on:
  workflow_dispatch:
    inputs:
      test_ios:
        description: 'Run iOS tests'
        required: false
        type: boolean
        default: true
      test_android:
        description: 'Run Android tests'
        required: false
        type: boolean
        default: true
      test_web:
        description: 'Run Web tests'
        required: false
        type: boolean
        default: true
      ios_use_frameworks:
        description: 'iOS framework linkage'
        required: false
        type: choice
        options:
          - dynamic
          - static
        default: dynamic
      simulator_device:
        description: 'iOS Simulator device'
        required: false
        default: 'iPhone 16 Pro'
        type: string
      android_api_level:
        description: 'Android API level'
        required: false
        default: '30'
        type: string
      android_device:
        description: 'Android device profile'
        required: false
        default: 'Nexus 5X'
        type: string

jobs:
  build-library:
    if: ${{ github.repository == 'wcandillon/react-native-skia' }}
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        run: yarn build

      - name: Pack package
        working-directory: packages/skia
        run: yarn pack

      - name: Upload package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: package-tgz
          path: packages/skia/package.tgz

  test-package-e2e:
    if: ${{ github.repository == 'wcandillon/react-native-skia' }}
    needs: build-library
    uses: ./.github/workflows/wcandillon-test-skia-package.yml
    with:
      skia_version: artifact:${{ needs.build-library.outputs.run_id }}
      test_ios: ${{ inputs.test_ios }}
      test_android: ${{ inputs.test_android }}
      test_web: ${{ inputs.test_web }}
      ios_use_frameworks: ${{ inputs.ios_use_frameworks }}
      simulator_device: ${{ inputs.simulator_device }}
      android_api_level: ${{ inputs.android_api_level }}
      android_device: ${{ inputs.android_device }}
